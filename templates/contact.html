<html lang="en">
<head>

    <title>Contact with Spam Detector</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
            body{
                margin: 0;
                background-image: url("../images/mainHero.png");
                font-weight: 500;
                font-family: Inter, sans-serif;
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                color: #1C385D;
            }
            .bg-image{
                position: absolute;
                width: 100%;
                min-width: 320px;
                opacity: 0.6;
                z-index: -1;
            }
            .nav-context{
                transition: all 0.3s linear;
                cursor: pointer;
                padding: 0.2vw 0.8vw;
                border-radius: 5px;
                color: #1C385D;
                text-decoration: none;
            }
            .nav-context:hover{
                    background-color: #D6D3E0;
            }
            .log-btn{
                padding: 0.6vw 1.2vw;
                cursor: pointer;
                border: 0.02vw #000 solid;
                border-radius: 0.3vw;
                color: #1C385D;
                background-color: white;
                transition: all 0.3s linear;
            }
            .log-btn:hover{
                background-color: #D9DDE5;
            }
            .sign-btn{
                padding: 0.6vw 1.2vw;
                cursor: pointer;
                border-radius: 0.3vw;
                background-color: #1B2F4D;
                color: white;
                margin-left: 1vw;
                transition: all 0.3s linear;
            }
            .sign-btn:hover{
                background-color: #465472;
            }  
            .footer-items{
                cursor: pointer;
                opacity: 80%;
                transition: all 0.2s linear;
            }
            .footer-items:hover{
                opacity: 100%;
                
            }
            .svg-icons{
                transition: all 0.2s linear;
                cursor: pointer;
            }
            .svg-icons:hover{
                transform: scale(110%);
            }
            .contact-form{
                background-color: #fff;
                border: none;
                width: 24vw;
                padding: 1vw;
                border-radius: 0.5vw;
                resize: none;

            }
            .contact-form:focus{
                outline: none;
            }
            .contact-textarea:placeholder-shown{
                font-family: Inter, sans-serif;
            }
            .submit-btn{
                padding: 0.6vw 1.2vw;
                cursor: pointer;
                border-radius: 0.3vw;
                background-color: #BF6CCF;
                color: #fff;
                transition: all 0.3s linear;
            }
            .submit-btn:hover{
                background-color: #BD7FE4;
            }
    </style>

                            <!-- navbar -->

        <div style="display: flex; flex-direction: row; font-size: 1vw; font-weight: 600;">

            <div style="padding: 0.2vw 0.8vw; border-radius: 5px; background-color: #1C385D; color: white;">Contact</div>
        </div>
        <!-- btn -->

            <div class="sign-btn">Sign Up</div>
        </div>
        </nav>

                                        <!-- Contact -->

            <!-- form -->
            <div style="width: 40vw; display: flex; flex-direction: column; align-items: center;">
                <div style="font-size: 3vw; font-weight: 600;">Contact Us</div>
                <div style="font-size: 1vw; margin-top: 0.5vw;">Feel Free to get in touch</div>
                <form action="" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <input type="text" name="" id="" class="contact-form" placeholder="Name" style="margin-top: 2vw;">
                    <input type="text" name="" id="" class="contact-form" placeholder="Email" style="margin-top: 1vw;">
                    <textarea rows="10"  class="contact-form contact-textarea" placeholder="Message" style="margin-top: 1vw;"></textarea>
                    <button class="submit-btn" style="margin-left: auto; margin-top: 1.5vw; text-align: center; display: inline; border: none;">Submit</button>
                </form>
            </div>




        </section>

                <a href="contact.html" style="margin-top: 0.4vw; text-decoration: none; color: #000;" class="footer-items">Contact</a>
            </div>
        </div>
        <!-- item2 -->
        <div>
            <!-- heading -->
            <div style="font-size: 2vw; font-weight: 600;">Legal</div>

            </div>
        </div>
